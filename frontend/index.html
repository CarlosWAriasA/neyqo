<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="vNXGFkT55f9tsXc5M6vxU_O_LUYzgOUYS5U_roHAxXY"
    />
    <meta
      name="description"
      content="Neyqo ayuda a administrar finanzas personales con claridad y confianza."
    />
    <meta name="theme-color" content="#0F766E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Neyqo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <script>
      (() => {
        const key = 'neyqo.theme';
        const preference = localStorage.getItem(key) || 'system';
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = preference === 'system' ? (systemDark ? 'dark' : 'light') : preference;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>Neyqo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
